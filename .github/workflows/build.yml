name: Build Executables

on:
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile --windowed --name LANChat client.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: LANChat-Windows
        path: dist/LANChat.exe
